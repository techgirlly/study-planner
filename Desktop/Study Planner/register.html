<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register</title>

  <style>

    body{
      font-family: Arial;
      background: #f4f4f4;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container{
      background: white;
      padding: 30px;
      border-radius: 10px;
      width: 300px;
    }

    input{
      width: 100%;
      padding: 10px;
      margin-top: 10px;
    }

    button{
      width: 100%;
      padding: 10px;
      margin-top: 15px;
      cursor: pointer;
    }

  </style>

</head>

<body>

  <div class="container">

    <h2>Register</h2>

    <form id="registerForm">

      <input
        type="text"
        id="username"
        placeholder="Username"
        required
      >

      <input
        type="email"
        id="email"
        placeholder="Email"
        required
      >

      <input
        type="password"
        id="password"
        placeholder="Password"
        required
      >

      <button type="submit">
        Register
      </button>

    </form>

    <p id="message"></p>

  </div>

  <script src="register.js"></script>

</body>
</html>
